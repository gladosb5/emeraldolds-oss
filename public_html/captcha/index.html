        function initCanvas() {
            canvas = document.getElementById('drawingCanvas');
            ctx = canvas.getContext('2d');
            
            const img = document.getElementById('baseImage');
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                setupCanvasEvents();
            };
            
            // If image is already loaded
            if (img.complete) {
                canvas.width = img.width;
                canvas.height = img.height;
                setupCanvasEvents();
            }
        }

        function setupCanvasEvents() {
            // Mouse events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Touch events for mobile
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDrawing);

            // Brush size control
            const brushSizeSlider = document.getElementById('brushSize');
            const brushSizeValue = document.getElementById('brushSizeValue');
            
            brushSizeSlider.addEventListener('input', function() {
                brushSizeValue.textContent = this.value;
            });
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            return {
                x: (e.touches[0].clientX - rect.left) * scaleX,
                y: (e.touches[0].clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const pos = getMousePos(e);
            const brushSize = document.getElementById('brushSize').value;
            
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#333';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent(e.type === 'touchstart' ? 'mousedown' : 
                                            e.type === 'touchmove' ? 'mousemove' : 'mouseup', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hideResult();
        }

        function submitDrawing() {
            const loading = document.getElementById('loading');
            const resultMessage = document.getElementById('resultMessage');
            
            loading.style.display = 'block';
            resultMessage.style.display = 'none';
            
            // Get canvas data
            const imageData = canvas.toDataURL();
            
            // Simulate verification process
            setTimeout(() => {
                const isValid = verifyDrawing();
                loading.style.display = 'none';
                showResult(isValid);
            }, 1500);
        }

        function verifyDrawing() {
            // Simple verification: check if there's drawing in the expected area
            const challenge = challenges[currentChallenge];
            const expectedArea = challenge.expectedArea;
            
            const imageData = ctx.getImageData(
                expectedArea.x, 
                expectedArea.y, 
                expectedArea.width, 
                expectedArea.height
            );
            
            // Count non-transparent pixels
            let drawnPixels = 0;
            for (let i = 3; i < imageData.data.length; i += 4) {
                if (imageData.data[i] > 0) { // Alpha channel > 0
                    drawnPixels++;
                }
            }
            
            // Require at least 50 pixels drawn in the expected area
            return drawnPixels > 50;
        }

        function showResult(isValid) {
            const resultMessage = document.getElementById('resultMessage');
            resultMessage.style.display = 'block';
            
            if (isValid) {
        window.parent.postMessage({ type : 'drawingCaptcha', success : true }, '*');
    }
}

        function hideResult() {

        }

        function newChallenge() {

            const challenge = challenges[currentChallenge];
            document.getElementById('challengeText').textContent = challenge.text;
            document.getElementById('baseImage').src = challenge.image;
            
            clearCanvas();
            hideResult();
        }

        // Initialize when page loads
        window.addEventListener('load', initCanvas);
